<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tienda</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">MiTienda</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="/">Comprar</a>
      <a class="nav-link" href="/admin/ventas">Ventas Realizadas</a>
      <a class="nav-link" href="/admin/productos">Administrar Productos</a>
      <a class="nav-link" href="/carrito">
        Carrito (<span th:text="${cantidadCarrito}">0</span>)
      </a>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <h2 class="mb-4">Listado de Productos</h2>
  <table class="table table-bordered">
    <thead class="table-dark">
    <tr>
      <th>Producto</th>
      <th>Precio (RD$)</th>
      <th>Cantidad</th>
      <th>Acción</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${productos}">
      <td th:text="${p.nombre}"></td>
      <td th:text="${p.precio}"></td>
      <td>
        <form th:action="@{/carrito/agregar}" method="post" class="d-flex gap-2">
          <input type="hidden" name="idProducto" th:value="${p.id}">
          <input type="number" name="cantidad" value="1" min="1" class="form-control" style="width:80px">
          <button type="submit" class="btn btn-primary btn-sm">Agregar</button>
        </form>
      </td>
      <td></td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
