<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ventas Realizadas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">MiTienda</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Comprar</a>
            <a class="nav-link active" href="/admin/ventas">Ventas Realizadas</a>
            <a class="nav-link" href="/admin/productos">Administrar Productos</a>
            <a class="nav-link" href="/logout">Cerrar Sesión</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">Listado de Ventas Realizadas</h2>

    <div th:each="venta : ${ventas}" class="card mb-4">
        <div class="card-header">
            <strong th:text="${venta.nombreCliente}"></strong>
            &mdash;
            <span th:text="${#dates.format(venta.fechaCompra, 'dd/MM/yyyy HH:mm')}"></span>
        </div>
        <div class="card-body p-0">
            <table class="table table-bordered mb-0">
                <thead class="table-secondary">
                <tr>
                    <th>Producto</th>
                    <th>Precio (RD$)</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${venta.listaProductos}">
                    <td th:text="${p.nombre}"></td>
                    <td th:text="${p.precio}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(ventas)}" class="text-muted">No hay ventas registradas aún.</div>
</div>
</body>
</html>
