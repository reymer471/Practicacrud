<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - Productos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container py-4">
<h2>Panel CRUD Productos</h2> <nav class="mb-4 btn-group">
    <a href="/admin/ventas" class="btn btn-outline-primary">Ver Ventas</a>
    <a href="/" class="btn btn-outline-secondary">Ver Tienda Pública</a>
    <a href="/logout" class="btn btn-outline-danger">Cerrar Sesión</a>
</nav>

<form method="post" action="/admin/productos/crear" class="card p-3 bg-light mb-4">
    <h5>Crear / Editar Producto</h5> <div class="row g-3 align-items-end">
    <div class="col-md-6">
        <label class="form-label">Nombre:</label>
        <input type="text" name="nombre" class="form-control" required>
    </div>
    <div class="col-md-4">
        <label class="form-label">Precio (RD$):</label>
        <input type="number" step="0.01" name="precio" class="form-control" required>
    </div>
    <div class="col-md-2">
        <button type="submit" class="btn btn-primary w-100">Guardar</button>
    </div>
</div>
</form>

<h3>Productos Almacenados</h3>
<table class="table table-bordered table-striped">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Precio</th>
        <th>Acción</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${productos}">
        <td th:text="${p.id}"></td>
        <td th:text="${p.nombre}"></td>
        <td th:text="${p.precio}"></td>
        <td>
            <a th:href="@{'/admin/productos/eliminar/' + ${p.id}}" class="btn btn-danger btn-sm">Eliminar</a> </td>
    </tr>
    </tbody>
</table>
</body>
</html>
