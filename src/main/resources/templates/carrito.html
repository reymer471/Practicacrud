<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Carrito de Compra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">MiTienda</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Comprar</a>
            <a class="nav-link" href="/admin/ventas">Ventas Realizadas</a>
            <a class="nav-link" href="/admin/productos">Administrar Productos</a>
            <a class="nav-link active" href="/carrito">Carrito</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">Carrito de Compra</h2>

    <form th:action="@{/carrito/procesar}" method="post">
        <div class="card mb-3">
            <div class="card-body">
                <h5>Datos del Cliente</h5>
                <div class="mb-2">
                    <label>Nombre del Cliente:</label>
                    <input type="text" name="nombreCliente" class="form-control" required>
                </div>
            </div>
        </div>

        <table class="table table-bordered">
            <thead class="table-dark">
            <tr>
                <th>Producto</th>
                <th>Precio (RD$)</th>
                <th>Cantidad</th>
                <th>Total (RD$)</th>
                <th>Acción</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${carrito}">
                <td th:text="${item.producto.nombre}"></td>
                <td th:text="${item.producto.precio}"></td>
                <td th:text="${item.cantidad}"></td>
                <td th:text="${item.producto.precio * item.cantidad}"></td>
                <td>
                    <a th:href="@{/carrito/eliminar/{id}(id=${item.producto.id})}"
                       class="btn btn-danger btn-sm">Eliminar</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(carrito)}">
                <td colspan="5" class="text-center text-muted">El carrito está vacío</td>
            </tr>
            </tbody>
            <tfoot>
            <tr>
                <th colspan="3" class="text-end">Total:</th>
                <th th:text="${total}"></th>
                <th></th>
            </tr>
            </tfoot>
        </table>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">Procesar Compra</button>
            <a href="/carrito/limpiar" class="btn btn-secondary">Limpiar Carro Compra</a>
        </div>
    </form>
</div>
</body>
</html>
