<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Tienda PUCMM</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container py-4">
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1>Listado de Productos</h1>
  <a href="/carrito" class="btn btn-primary">
    Carrito (<span th:text="${cantidadCarrito}">0</span>) </a>
</div>

<table class="table table-striped table-bordered">
  <thead class="table-dark">
  <tr>
    <th>Producto</th>
    <th>Precio (RD$)</th>
    <th>Cantidad</th>
    <th>Acción</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="producto : ${productos}">
    <td th:text="${producto.nombre}"></td>
    <td th:text="${producto.precio}"></td>
    <td>
      <form method="post" action="/carrito/agregar" class="d-flex gap-2">
        <input type="hidden" name="idProducto" th:value="${producto.id}">
        <input type="number" name="cantidad" value="1" min="1" class="form-control" style="width: 80px;">
        <button type="submit" class="btn btn-success btn-sm">Agregar</button>
      </form>
    </td>
  </tr>
  </tbody>
</table>
<div class="mt-3">
  <a href="/admin/productos" class="text-muted">Zona de Administración</a>
</div>
</body>
</html>
